<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #00d4aa;
      letter-spacing: 0.5px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .label { color: #888; }
    .value { color: #e0e0e0; font-weight: 500; }
    .value.ok  { color: #00d4aa; }
    .value.err { color: #ff6b6b; }
    .value.warn { color: #ffa500; }
    #token-preview {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 10px;
      font-family: monospace;
      color: #666;
      word-break: break-all;
      margin: 10px 0;
      max-height: 40px;
      overflow: hidden;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    #btn-sync {
      background: #00d4aa;
      color: #1a1a2e;
    }
    #btn-sync:hover  { background: #00b894; }
    #btn-sync:disabled { background: #333; color: #666; cursor: default; }
    #result {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
    }
    .result-ok  { color: #00d4aa; }
    .result-err { color: #ff6b6b; }
  </style>
</head>
<body>
  <h2>⚡ Stockbit Token Sync</h2>

  <div class="status-row">
    <span class="label">Token captured</span>
    <span class="value" id="token-status">—</span>
  </div>
  <div class="status-row">
    <span class="label">Captured at</span>
    <span class="value" id="captured-at">—</span>
  </div>
  <div class="status-row">
    <span class="label">Local server</span>
    <span class="value" id="server-status">checking…</span>
  </div>

  <div id="token-preview">No token captured yet. Open Stockbit and navigate to any page.</div>

  <button id="btn-sync" disabled>Sync Token to Claude</button>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
